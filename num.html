    <h1>Gestor de Números</h1>

    <input type="number" id="numero">
    <br>

    <button onclick="adicionar()">Adicionar</button>
    <button onclick="calcular()">Calcular</button>
    <button onclick="ordenar()">Ordenar</button>
    <button onclick="limpar()">Limpar</button>

    <button onclick="gerar()">Gerar 1 até N</button>

    <p id="mensagem"></p>

    <h3>Lista:</h3>
    <ul id="lista"></ul>

    <div id="resultados"></div>

    <div id="sequencia"></div>

    <script>


        function gerar() {
    let input = document.getElementById("numero");
    let valor = input.value;
    let mensagem = document.getElementById("mensagem");
    let seq = document.getElementById("sequencia");

    mensagem.textContent = "";
    seq.innerHTML = "";

    if (valor === "" || isNaN(valor) || Number(valor) <= 0) {
        mensagem.textContent = "Por favor insere um número válido maior que 0.";
        return;
    }

    let n = Number(valor);
    let pares = 0;
    let impares = 0;

    let resultado = "";

    for (let i = 1; i <= n; i++) {
        if (i % 2 === 0) {
            resultado += i + " - Par<br>";
            pares++;
        } else {
            resultado += i + " - Ímpar<br>";
            impares++;
        }
    }

    resultado += "<br><strong>Pares:</strong> " + pares + "<br>";
    resultado += "<strong>Ímpares:</strong> " + impares;

    seq.innerHTML = resultado;
}


        let numeros = [];

        function adicionar() {
            let input = document.getElementById("numero");
            let valor = input.value;
            let mensagem = document.getElementById("mensagem");

            mensagem.textContent = "";

            if (valor === "" || isNaN(valor)) {
                mensagem.textContent = "Por favor insere um número válido.";
                return;
            }

            let num = Number(valor);

            for (let i = 0; i < numeros.length; i++) {
                if (numeros[i] === num) {
                    mensagem.textContent = "Esse número já foi adicionado.";
                    return;
                }
            }

            numeros.push(num);
            atualizarLista();
            input.value = "";
        }

        function atualizarLista() {
            let lista = document.getElementById("lista");
            lista.innerHTML = "";

            if (numeros.length === 0) return;

            let maior = Math.max(...numeros);
            let menor = Math.min(...numeros);

            for (let i = 0; i < numeros.length; i++) {
                let li = document.createElement("li");

                li.textContent = `Índice ${i}: ${numeros[i]} `;

                // destacar maior e menor
                if (numeros[i] === maior) {
                    li.classList.add("maior");
                } else if (numeros[i] === menor) {
                    li.classList.add("menor");
                }

                // botão remover
                let btn = document.createElement("button");
                btn.textContent = "Remover";
                btn.onclick = function() {
                    remover(i);
                };

                li.appendChild(btn);
                lista.appendChild(li);
            }
        }

        function remover(indice) {
            numeros.splice(indice, 1);
            atualizarLista();
        }

        function ordenar() {
            numeros.sort(function(a, b) {
                return a - b;
            });
            atualizarLista();
        }

        function calcular() {
            let mensagem = document.getElementById("mensagem");
            let resultados = document.getElementById("resultados");

            mensagem.textContent = "";
            resultados.innerHTML = "";

            if (numeros.length === 0) {
                mensagem.textContent = "A lista está vazia. Adiciona números primeiro.";
                return;
            }

            let soma = 0;
            let maior = numeros[0];
            let menor = numeros[0];
            let pares = 0;
            let impares = 0;

            for (let i = 0; i < numeros.length; i++) {
                soma += numeros[i];

                if (numeros[i] > maior) maior = numeros[i];
                if (numeros[i] < menor) menor = numeros[i];

                if (numeros[i] % 2 === 0) {
                    pares++;
                } else {
                    impares++;
                }
            }

            let media = soma / numeros.length;

            resultados.innerHTML = `
                Total: ${numeros.length} <br>
                Soma: ${soma} <br>
                Média: ${media.toFixed(2)} <br>
                Maior número: ${maior} <br>
                Menor número: ${menor} <br>
                Pares: ${pares} <br>
                Ímpares: ${impares}
            `;
        }

        function limpar() {
            numeros = [];
            document.getElementById("lista").innerHTML = "";
            document.getElementById("resultados").innerHTML = "";
            document.getElementById("mensagem").textContent = "";
        }
    </script>
