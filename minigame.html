<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click the Target Game</title>
<link rel="stylesheet" href="styles.css">
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      margin: 0;
    }

    h1 {
      margin-top: 10px;
      font-size: 1.8em;
    }

    #gameArea {
      width: 90vw;
      max-width: 400px;
      height: 90vw;
      max-height: 400px;
      margin: 20px auto;
      background: #333;
      position: relative;
      border: 2px solid #fff;
      touch-action: manipulation;
    }

    #target {
      width: 12vw;
      height: 12vw;
      max-width: 50px;
      max-height: 50px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>

<nav>
    <a href="index.html">Home</a>
    <a href="hobby.html">Hobbies</a>
    <br>
    <a href="galeria.html">Gallery</a>
    <a href="faq.html">FAQ</a>

    <a href="tabu.html">Tabuada</a>

    <a href="minigame.html">Minigame</a>
  </nav>


<body>

  <h1>🎯 Tap the Target!</h1>
  <p>Score: <span id="score">0</span></p>
  <p>Time: <span id="time">10</span>s</p>
  <button onclick="startGame()">Start Game</button>

  <div id="gameArea">
    <div id="target"></div>
  </div>

  <!-- Sounds -->
  <audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=click-124467.mp3"></audio>
  <audio id="gameOverSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7c4c.mp3?filename=game-over-arcade-6435.mp3"></audio>

  <script>
    let score = 0;
    let timeLeft = 10;
    let gameInterval;
    let timerInterval;

    const target = document.getElementById("target");
    const gameArea = document.getElementById("gameArea");
    const clickSound = document.getElementById("clickSound");
    const gameOverSound = document.getElementById("gameOverSound");

    function moveTarget() {
      const maxX = gameArea.clientWidth - target.clientWidth;
      const maxY = gameArea.clientHeight - target.clientHeight;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function hitTarget() {
      score++;
      document.getElementById("score").textContent = score;

      clickSound.currentTime = 0;
      clickSound.play();

      moveTarget();
    }

    // Support both click and touch
    target.addEventListener("click", hitTarget);
    target.addEventListener("touchstart", function(e) {
      e.preventDefault();
      hitTarget();
    });

    function startGame() {
      score = 0;
      timeLeft = 10;

      document.getElementById("score").textContent = score;
      document.getElementById("time").textContent = timeLeft;

      moveTarget();

      clearInterval(gameInterval);
      clearInterval(timerInterval);

      gameInterval = setInterval(moveTarget, 800);

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time").textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(gameInterval);
          clearInterval(timerInterval);

          gameOverSound.play();

          setTimeout(() => {
            alert("Game Over! Your score: " + score);
          }, 100);
        }
      }, 1000);
    }
  </script>

</body>
</html>
